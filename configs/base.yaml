random_state: 2137

data:
  root_dir: data/7class
  val_size: 0.1
  test_size: 0.15
  resize: [128, 128]
  batch_size: 32
  grayscale: false
  num_classes: 7
  class_weights: false

model:
  out_channels: [32, 64, 128]
  dense_hidden_dims: [512, 256, 64]
  conv_kernel_size: 3
  pool_kernel_size: 2
  dropout_rate: 0.3

train:
  num_epochs: 80
  lr: 0.001
  scheduler_patience: 5
  early_stopping_patience: 10
  early_stopping_min_delta: 0.0
