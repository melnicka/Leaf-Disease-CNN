random_state: 2137

data:
  root_dir: data
  val_size: 0.1
  test_size: 0.15
  resize: [128, 128]
  batch_size: 32
  grayscale: false

model:
  out_channels: [32, 64, 128]
  dense_hidden_dims: [512, 256, 64]
  conv_kernel_size: 3
  pool_kernel_size: 2

train:
  num_epochs: 100
  lr: 0.001
  scheduler_patience: 4
  class_weights:
    - 0.0602
    - 0.0458
    - 0.1705
    - 0.5041
    - 0.0561
    - 0.0988
    - 0.0644
